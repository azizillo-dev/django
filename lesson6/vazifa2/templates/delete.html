<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Car</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .delete-box {
            background: rgba(248, 113, 113, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(248, 113, 113, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #f1f5f9;
        }
        .highlight {
            color: #f87171;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
        }
        .btn-cancel {
            display: block;
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        .btn-cancel:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="delete-box">
        <h1>Rostdan ham <span class="highlight">{{ car.brand }} {{ car.model }}</span> avtomobilini o'chirishni istaysizmi?</h1>
        <form method="POST">
            {% csrf_token %}
            <button type="submit">Ha, o'chirish</button>
        </form>
        <a href="{% url 'home_page' %}" class="btn-cancel">Yo'q, orqaga qaytish</a>
    </div>
</body>
</html>
