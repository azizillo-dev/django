<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Computer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
            overflow:hidden;
        }

        body::before{
            content:'';
            position:absolute;
            width:320px;
            height:320px;
            background:#ef4444;
            border-radius:50%;
            filter:blur(170px);
            top:-100px;
            left:-100px;
        }

        body::after{
            content:'';
            position:absolute;
            width:320px;
            height:320px;
            background:#8b5cf6;
            border-radius:50%;
            filter:blur(170px);
            bottom:-100px;
            right:-100px;
        }

        .card{
            width:450px;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.2);
            border-radius:22px;
            padding:40px;
            text-align:center;
            color:white;
            box-shadow:0 20px 45px rgba(0,0,0,.35);
            z-index:1;
        }

        .icon{
            font-size:70px;
            margin-bottom:15px;
        }

        h2{
            margin-bottom:15px;
            font-size:28px;
        }

        p{
            color:#d1d5db;
            margin-bottom:30px;
            line-height:1.6;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:15px;
        }

        button{
            border:none;
            cursor:pointer;
            padding:14px 28px;
            border-radius:12px;
            font-size:15px;
            font-weight:600;
            transition:.3s;
        }

        .delete{
            background:#ef4444;
            color:white;
        }

        .delete:hover{
            background:#dc2626;
            transform:translateY(-3px);
        }

        .cancel{
            display:flex;
            align-items:center;
            justify-content:center;
            text-decoration:none;
            background:#334155;
            color:white;
            padding:14px 28px;
            border-radius:12px;
            transition:.3s;
        }

        .cancel:hover{
            background:#475569;
            transform:translateY(-3px);
        }

    </style>

</head>
<body>

<div class="card">

    <div class="icon">
        🗑️
    </div>

    <h2>Delete Computer</h2>

    <p>
        <strong>{{ computer.brand }} {{ computer.name }}</strong>
        <br><br>
        Rostdan ham ushbu kompyuterni o'chirmoqchimisiz?
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="buttons">

            <button class="delete" type="submit">
                Yes, Delete
            </button>

            <a href="/" class="cancel">
                Cancel
            </a>

        </div>

    </form>

</div>

</body>
</html>
