<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Computer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
            overflow:hidden;
        }

        body::before{
            content:'';
            position:absolute;
            width:300px;
            height:300px;
            background:#3b82f6;
            border-radius:50%;
            filter:blur(150px);
            top:-100px;
            left:-100px;
        }

        body::after{
            content:'';
            position:absolute;
            width:300px;
            height:300px;
            background:#8b5cf6;
            border-radius:50%;
            filter:blur(150px);
            bottom:-100px;
            right:-100px;
        }

        .card{
            width:430px;
            padding:35px;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.2);
            border-radius:22px;
            box-shadow:0 20px 45px rgba(0,0,0,.3);
            z-index:2;
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:18px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,.1);
            color:white;
            font-size:15px;
            border:1px solid rgba(255,255,255,.15);
        }

        input::placeholder{
            color:#d1d5db;
        }

        input:focus{
            border-color:#38bdf8;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:10px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            font-size:16px;
            font-weight:600;
            color:white;
            background:linear-gradient(135deg,#06b6d4,#2563eb);
            transition:.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 15px 25px rgba(37,99,235,.4);
        }

        .back{
            display:block;
            text-align:center;
            margin-top:18px;
            color:white;
            text-decoration:none;
            transition:.3s;
        }

        .back:hover{
            color:#38bdf8;
        }

    </style>

</head>
<body>

<div class="card">

    <h1>💻 Add New Computer</h1>

    <form method="POST">

        {% csrf_token %}

        <div class="input-box">
            <input type="text" name="brand" placeholder="Brand" required>
        </div>

        <div class="input-box">
            <input type="text" name="name" placeholder="Model" required>
        </div>

        <div class="input-box">
            <input type="number" step="0.01" name="price" placeholder="Price" required>
        </div>

        <div class="input-box">
            <input type="number" name="gpu" placeholder="GPU (GB)" required>
        </div>

        <div class="input-box">
            <input type="text" name="screen_info" placeholder="Screen Information" required>
        </div>

        <button type="submit">
            ➕ Add Computer
        </button>

    </form>

    <a href="/" class="back">
        ← Back to Home
    </a>

</div>

</body>
</html>
