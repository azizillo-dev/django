<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details</title>
</head>
<body>
    <h1>{{ book.title }}</h1>
    <p>Author: {{ book.author }}</p>
    <p>Price: ${{ book.price }}</p>
    <p>Description: {{ book.desc }}</p>
    <p>Count: {{ book.count }}</p>
</body>
</html>
