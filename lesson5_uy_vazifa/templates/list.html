<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book list</title>
</head>
<body>
    <h1>Kitoblar ro'yhati</h1>
    {% for book in books %}
    <h3>{{book.title}}</h3>
    <p>Author: {{ book.author }}</p><br>
    <p>Price: {{ book.price }}</p><br>
    <p>Description: {{book.desc}}</p>
    <p>Count: {{book.Count}}</p>
    <hr>
    {% endfor %}
</body>
</html>
