<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; color: #333; }
        .container { max-width: 800px; margin: auto; }
        nav { background: #333; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; display: flex; gap: 15px; }
        nav a { color: white; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .card { background: white; padding: 20px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 20px; }
        button, .btn { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        button:hover, .btn:hover { background: #0056b3; }
        input, textarea, select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="{% url 'accounts:landing' %}">Home</a>
            <a href="{% url 'products:list' %}">Products</a>
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:dashboard' %}">Dashboard</a>
                <a href="{% url 'accounts:profile' %}">Profile</a>
                <a href="{% url 'accounts:logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'accounts:login' %}">Login</a>
                <a href="{% url 'accounts:register' %}">Register</a>
            {% endif %}
        </nav>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
