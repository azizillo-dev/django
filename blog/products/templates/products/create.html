{% extends 'base.html' %}
{% block title %}Create Product{% endblock %}
{% block content %}
    <div class="card" style="max-width: 400px;">
        <h2>Create New Product</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="background: #28a745;">Create</button>
        </form>
        <br>
        <a href="{% url 'products:list' %}">Cancel</a>
    </div>
{% endblock %}
