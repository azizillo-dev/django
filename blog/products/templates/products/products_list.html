<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; }
        .product { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; background: white; border-radius: 5px; }
        a { text-decoration: none; color: #007bff; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>All Products</h1>
    <a href="{% url 'accounts:dashboard' %}">Profilga o'tish</a>
    <a href="{% url 'products:create' %}" style="display:inline-block; margin-bottom: 20px;">+ Add Product</a>
    {% for product in products %}
    <div class="product">
        <h2><a href="{% url 'products:detail' product.pk %}">{{ product.name }}</a></h2>
        <p>Price: ${{ product.price }}</p>
        <p>Owner: {{ product.owner.username }}</p>
    </div>
    {% empty %}
    <p>No products found.</p>
    {% endfor %}
</body>
</html>
