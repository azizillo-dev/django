{% extends 'base.html' %}
{% block title %}Products{% endblock %}
{% block content %}
    <h1>All Products</h1>
    <a href="{% url 'products:create' %}" class="btn" style="margin-bottom: 20px;">+ Add Product</a>
    {% for product in products %}
    <div class="card">
        <h2><a href="{% url 'products:detail' product.pk %}">{{ product.name }}</a></h2>
        <p>Price: ${{ product.price }}</p>
        <p>Owner: {{ product.owner.username }}</p>
    </div>
    {% empty %}
    <p>No products found.</p>
    {% endfor %}
{% endblock %}
