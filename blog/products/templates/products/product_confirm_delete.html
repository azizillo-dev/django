<!DOCTYPE html>
<html>
<head>
    <title>Delete Product</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 5px; border: 1px solid #ddd; display: inline-block; }
        button { padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        a { text-decoration: none; color: #6c757d; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Are you sure you want to delete "{{ product.name }}"?</h2>
        <form method="POST">
            {% csrf_token %}
            <button type="submit">Yes, delete it</button>
            <a href="{% url 'products:detail' product.pk %}">Cancel</a>
        </form>
    </div>
</body>
</html>
