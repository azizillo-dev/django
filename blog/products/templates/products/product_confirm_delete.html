{% extends 'base.html' %}
{% block title %}Delete Product{% endblock %}
{% block content %}
    <div class="card" style="text-align: center;">
        <h2>Are you sure you want to delete "{{ product.name }}"?</h2>
        <form method="POST" style="margin-top: 20px;">
            {% csrf_token %}
            <button type="submit" style="background: #dc3545;">Yes, delete it</button>
            <a href="{% url 'products:detail' product.pk %}" class="btn" style="background: #6c757d;">Cancel</a>
        </form>
    </div>
{% endblock %}
