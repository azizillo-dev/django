<!DOCTYPE html>
<html>
<head>
    <title>Update Product</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; }
        form { background: white; padding: 20px; border-radius: 5px; border: 1px solid #ddd; max-width: 400px; }
        button { margin-top: 15px; padding: 8px 15px; background: #ffc107; color: black; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Update Product</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update</button>
    </form>
    <br>
    <a href="{% url 'products:list' %}" style="text-decoration: none; color: #007bff;">Cancel</a>
</body>
</html>
