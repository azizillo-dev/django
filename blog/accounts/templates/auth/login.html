{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
    <div class="card" style="max-width: 400px; margin: auto;">
        <h2>Login</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign In</button>
        </form>
        <p style="margin-top: 15px;">Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a></p>
    </div>
{% endblock %}
