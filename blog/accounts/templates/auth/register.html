{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
    <div class="card" style="max-width: 400px; margin: auto;">
        <h2>Register</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="background: #28a745;">Sign Up</button>
        </form>
        <p style="margin-top: 15px;">Already have an account? <a href="{% url 'accounts:login' %}">Login here</a></p>
    </div>
{% endblock %}
