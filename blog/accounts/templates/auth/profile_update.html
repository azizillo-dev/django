{% extends 'base.html' %}
{% block title %}Update Profile{% endblock %}
{% block content %}
    <div class="card" style="max-width: 400px; margin: auto;">
        <h2>Update Profile</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="background: #ffc107; color: black;">Save Changes</button>
        </form>
        <br>
        <a href="{% url 'accounts:profile' %}">Cancel</a>
    </div>
{% endblock %}
