<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-EDU // MODUL TAHRIRLASH: {{ course.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #040711;
            --cyber-amber: #ffbe00;
            --cyber-orange: #ff6a00;
            --cyber-pink: #ff007f;
            --cyber-cyan: #00f2fe;
            --glass-panel: rgba(10, 18, 38, 0.82);
            --border-glow: rgba(255, 190, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 190, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 190, 0, 0.04) 1px, transparent 1px);
            background-size: 35px 35px;
            z-index: -1;
        }

        /* Console Box */
        .generator-console {
            width: 100%;
            max-width: 780px;
            background: var(--glass-panel);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 45px 50px;
            position: relative;
            box-shadow: 0 0 55px rgba(255, 190, 0, 0.2);
            animation: formEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .generator-console::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cyber-amber), var(--cyber-orange));
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-family: 'Share Tech Mono', monospace;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--cyber-amber);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            background: rgba(255, 190, 0, 0.1);
            border: 1px solid rgba(255, 190, 0, 0.3);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: var(--cyber-amber);
            color: #040711;
            box-shadow: 0 0 20px rgba(255, 190, 0, 0.6);
        }

        .sys-tag {
            font-size: 0.85rem;
            color: var(--cyber-amber);
            letter-spacing: 2px;
            background: rgba(255, 190, 0, 0.12);
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid var(--cyber-amber);
        }

        .console-title {
            margin-bottom: 35px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
            padding-bottom: 20px;
        }

        .console-title h1 {
            font-size: 2.3rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ffffff, var(--cyber-amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .console-title p {
            font-family: 'Share Tech Mono', monospace;
            color: #64748b;
            font-size: 0.95rem;
        }

        /* Form layout */
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: #cbd5e1;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input, textarea {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255, 190, 0, 0.04);
            border: 1px solid rgba(255, 190, 0, 0.25);
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        input:focus, textarea:focus {
            border-color: var(--cyber-amber);
            background: rgba(255, 190, 0, 0.08);
            box-shadow: 0 0 20px rgba(255, 190, 0, 0.35);
            transform: translateY(-2px);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Submit Button */
        .btn-submit {
            grid-column: 1 / -1;
            margin-top: 15px;
            padding: 18px;
            background: linear-gradient(135deg, var(--cyber-amber) 0%, var(--cyber-orange) 100%);
            color: #040711;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 3px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 190, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-submit:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 45px rgba(255, 190, 0, 0.8);
        }

        @keyframes formEntry {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 768px) {
            .generator-console { padding: 35px 25px; }
            form { grid-template-columns: 1fr; }
            .console-title h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>

    <div class="generator-console">
        <div class="top-nav">
            <a href="{% url 'list' %}" class="btn-back">← MATRIX GA QAYTISH</a>
            <span class="sys-tag">// MODULE_OVERWRITE</span>
        </div>

        <div class="console-title">
            <h1>⚙️ MODUL MA'LUMOTLARINI YANGILASH</h1>
            <p>> "{{ course.title }}" — parametrlarini o'zgartirib tizimga saqlang:</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="title">[ 📌 ] KURS NOMI / TITLE</label>
                <input type="text" id="title" name="title" value="{{ course.title }}" required>
            </div>

            <div class="input-group">
                <label for="teacher">[ 👨‍🏫 ] O'QITUVCHI / INSTRUCTOR</label>
                <input type="text" id="teacher" name="teacher" value="{{ course.teacher }}" required>
            </div>

            <div class="input-group">
                <label for="price">[ 💵 ] NARXI (SO'M) / PRICE</label>
                <input type="number" step="0.01" id="price" name="price" value="{{ course.price }}" required>
            </div>

            <div class="input-group">
                <label for="days">[ ⏳ ] DAVOMIYLIGI (KUN) / DURATION</label>
                <input type="number" id="days" name="days" value="{{ course.days }}" required>
            </div>

            <div class="input-group full">
                <label for="desc">[ 📝 ] TAVSIF / DESCRIPTION</label>
                <textarea id="desc" name="desc">{{ course.desc }}</textarea>
            </div>

            <button type="submit" class="btn-submit">
                [ 🔄 EXECUTE OVERWRITE // YANGILASH VA SAQLASH ]
            </button>
        </form>
    </div>
</body>
</html>
