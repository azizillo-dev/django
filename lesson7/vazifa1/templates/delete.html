<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxTime | O'chirishni Tasdiqlash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070b19;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 8, 68, 0.4);
            --danger-gradient: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            --cancel-gradient: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            --text-main: #ffffff;
            --text-muted: #a0aec0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Orbs */
        .ambient-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.5;
            animation: floatOrb 10s infinite ease-in-out alternate;
        }

        .orb-1 {
            top: 20%;
            left: 25%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #ff0844, #ffb199);
            animation-delay: 0s;
        }

        .orb-2 {
            bottom: 20%;
            right: 25%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #7f00ff, #e100ff);
            animation-delay: -5s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-30px, 30px) scale(1.15);
            }
            100% {
                transform: translate(30px, -30px) scale(0.95);
            }
        }

        /* Delete Dialog Card */
        .delete-card {
            width: 100%;
            max-width: 520px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 45px 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(255, 8, 68, 0.25);
            position: relative;
            animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
        }

        .delete-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--danger-gradient);
        }

        .warning-icon {
            width: 86px;
            height: 86px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 8, 68, 0.15);
            border: 2px solid rgba(255, 8, 68, 0.4);
            border-radius: 50%;
            font-size: 2.5rem;
            color: #ff0844;
            box-shadow: 0 0 30px rgba(255, 8, 68, 0.4);
            animation: pulseWarning 2s infinite ease-in-out;
        }

        @keyframes pulseWarning {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 25px rgba(255, 8, 68, 0.4);
            }
            50% {
                transform: scale(1.08);
                box-shadow: 0 0 45px rgba(255, 8, 68, 0.75);
            }
        }

        .title {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .watch-highlight {
            color: #ff4d6d;
            font-weight: 700;
            background: rgba(255, 8, 68, 0.15);
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 8, 68, 0.3);
        }

        /* Buttons Container */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn-confirm {
            width: 100%;
            padding: 16px;
            background: var(--danger-gradient);
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 800;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(255, 8, 68, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-confirm:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 18px 40px rgba(255, 8, 68, 0.6);
        }

        .btn-confirm:active {
            transform: translateY(-1px) scale(0.98);
        }

        .btn-cancel {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @media (max-width: 480px) {
            .delete-card {
                padding: 35px 25px;
            }
            .title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- Ambient Background -->
    <div class="ambient-background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Delete Dialog Card -->
    <div class="delete-card">
        <div class="warning-icon">🗑️</div>
        
        <h1 class="title">O'chirishni Tasdiqlash</h1>
        
        <p class="subtitle">
            Rostdan ham <span class="watch-highlight">{{ watch.name }}</span> soatini kolleksiyadan butunlay o'chirmoqchimisiz? Ushbu amalni ortga qaytarib bo'lmaydi.
        </p>

        <div class="actions">
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn-confirm">
                    🗑️ HA, BUTUNLAY O'CHIRILSIN
                </button>
            </form>
            <a href="{% url 'home_page' %}" class="btn-cancel">
                ❌ YO'Q, BEKOR QILISH VA QAYTISH
            </a>
        </div>
    </div>
</body>
</html>
