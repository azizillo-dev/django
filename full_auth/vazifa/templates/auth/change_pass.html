<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parolni O'zgartirish - Book Shop</title>
    <style>
        body {
            background-color: #2c1e16;
            background-image: url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .book-container {
            display: flex;
            width: 800px;
            height: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 10px;
            background: #f4ecd8;
        }

        .page {
            width: 50%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        
        .page::-webkit-scrollbar { width: 6px; }
        .page::-webkit-scrollbar-track { background: transparent; }
        .page::-webkit-scrollbar-thumb { background: #c2b28f; border-radius: 3px; }

        .page-left {
            border-radius: 10px 0 0 10px;
            border-right: 2px solid #d3c5a3;
            background: linear-gradient(to right, #e8dcc4 0%, #f4ecd8 15%, #f4ecd8 95%, #e0d0b0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .page-right {
            border-radius: 0 10px 10px 0;
            background: linear-gradient(to left, #e8dcc4 0%, #f4ecd8 15%, #f4ecd8 95%, #e0d0b0 100%);
        }

        h1 {
            color: #5c3a21;
            font-size: 28px;
            margin-bottom: 20px;
            border-bottom: 2px solid #5c3a21;
            padding-bottom: 10px;
            font-style: italic;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form p {
            margin-bottom: 10px;
            text-align: left;
        }

        input[type="text"], input[type="password"], input[type="email"], select, input[type="file"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #c2b28f;
            background: #fdfaf3;
            border-radius: 4px;
            font-family: 'Georgia', serif;
            box-sizing: border-box;
        }

        label {
            font-size: 14px;
            color: #5c3a21;
            font-weight: bold;
        }
        
        .helptext, ul.errorlist {
            font-size: 12px;
            color: #8b5a33;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        button {
            background-color: #5c3a21;
            color: #f4ecd8;
            border: none;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
            font-family: 'Georgia', serif;
            font-style: italic;
            margin-top: 15px;
        }

        button:hover {
            background-color: #3d2413;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #8b5a33;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="book-container">
        <div class="page page-left">
            <h1>Xavfsizlik</h1>
            <p style="color: #4a3625; line-height: 1.6;">O'z ma'lumotlaringizni va sirlaringizni ishonchli himoyada saqlang.</p>
        </div>
        <div class="page page-right">
            <h1>Parolni O'zgartirish</h1>
            <form method="POST">
                {% csrf_token %}
                {{form.as_p}}
                <button type="submit">O'zgartirish</button>
            </form>
            <div style="text-align: center;">
                <a href="{% url 'accounts:profile' %}" class="back-link">Ortga Qaytish</a>
            </div>
        </div>
    </div>
</body>
</html>
